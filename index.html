<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的股票监控 - 长电科技</title>
    <!-- 适配GitHub Pages的跨域策略 -->
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://hq.sinajs.cn; style-src 'self' 'unsafe-inline';">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, "微软雅黑", sans-serif;
            padding: 15px;
        }
        .title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin: 20px 0;
        }
        .stock-card {
            background: #fff;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-info {
            flex: 1;
        }
        .stock-name {
            font-size: 18px;
            color: #222;
            font-weight: 500;
        }
        .stock-code {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .stock-price {
            text-align: right;
            flex: 1;
        }
        .price {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.2;
        }
        .up {
            color: #f53f3f;
        }
        .down {
            color: #00b42a;
        }
        .flat {
            color: #666;
        }
        .change {
            font-size: 14px;
            margin-top: 4px;
        }
        .refresh-tip {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="title">我的自选股</div>
    <div id="stockContainer"></div>
    <div class="refresh-tip">数据每5秒自动刷新 | 行情延迟约15秒</div>

    <script>
        // 配置你的股票：600584长电科技（沪市前缀sh）
        const STOCK_LIST = [
            { code: "600584", name: "长电科技", marketPrefix: "sh" }
            { code: "001896", name: "豫能控股", marketPrefix: "sh" }
        ];

        // 解析新浪财经JSONP数据
        function parseStockData(stockItem, rawData) {
            try {
                const dataArr = rawData.split(',');
                const currentPrice = dataArr[3] || '0.00'; // 最新价
                const yesterdayPrice = dataArr[2] || currentPrice; // 昨收价
                const priceChange = (currentPrice - yesterdayPrice).toFixed(2); // 涨跌额
                const changeRate = ((priceChange / yesterdayPrice) * 100).toFixed(2); // 涨跌幅

                // 判定涨跌样式
                let priceClass = 'flat';
                if (parseFloat(priceChange) > 0) priceClass = 'up';
                if (parseFloat(priceChange) < 0) priceClass = 'down';

                return `
                    <div class="stock-card">
                        <div class="stock-info">
                            <div class="stock-name">${stockItem.name}</div>
                            <div class="stock-code">${stockItem.code}</div>
                        </div>
                        <div class="stock-price">
                            <div class="price ${priceClass}">${currentPrice}</div>
                            <div class="change ${priceClass}">${priceChange} / ${changeRate}%</div>
                        </div>
                    </div>
                `;
            } catch (e) {
                return `<div class="stock-card"><div>⚠️ ${stockItem.name} 数据加载失败</div></div>`;
            }
        }

        // 加载单只股票数据（JSONP方式，适配GitHub Pages）
        function loadStock(stockItem) {
            return new Promise((resolve) => {
                // 生成唯一回调名，避免冲突
                const callbackName = `stockCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
                const script = document.createElement('script');
                
                // 新浪财经JSONP接口（稳定、无跨域限制）
                const apiUrl = `https://hq.sinajs.cn/list=${stockItem.marketPrefix}${stockItem.code}?r=${Math.random()}&callback=${callbackName}`;
                
                // 定义回调函数
                window[callbackName] = function(data) {
                    const html = parseStockData(stockItem, data);
                    resolve(html);
                    // 清理资源
                    document.body.removeChild(script);
                    delete window[callbackName];
                };

                // 加载超时处理
                script.timeout = setTimeout(() => {
                    resolve(`<div class="stock-card"><div>⚠️ ${stockItem.name} 加载超时</div></div>`);
                    document.body.removeChild(script);
                    delete window[callbackName];
                }, 5000);

                script.src = apiUrl;
                document.body.appendChild(script);
            });
        }

        // 批量加载所有股票并渲染
        async function renderAllStocks() {
            const container = document.getElementById('stockContainer');
            let html = '';
            
            for (const stock of STOCK_LIST) {
                html += await loadStock(stock);
            }
            
            container.innerHTML = html;
        }

        // 初始化 + 定时刷新
        renderAllStocks();
        setInterval(renderAllStocks, 5000);
    </script>
</body>
</html>
